name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Smoke test - DDIM sampler (CPU, minimal)
        run: |
          python nanoddpm-pro.py --sampler ddim --epochs 1 --steps 100 --batch_size 16 --resize 16 --device cpu
      - name: Smoke test - EDM sampler + Euler (CPU, minimal)
        run: |
          python nanoddpm-pro.py --sampler edm --solver euler --epochs 1 --batch_size 16 --resize 16 --sample_steps 10 --device cpu
        # run: |
        #   python nanoddpm-pro-ddim.py --epochs 1 --steps 100 --batch_size 16 --resize 16 --device cpu
        #   python nanoddpm-pro-edm.py --epochs 1 --batch_size 16 --resize 16 --sample_steps 10 --solver euler --device cpu